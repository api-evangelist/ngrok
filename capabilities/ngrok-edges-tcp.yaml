    namespace: ngrok-edges-tcp-rest
    port: 8080
    description: REST adapter for Ngrok API — Edges TCP. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/edges/tcp
      name: edges-tcp
      description: REST surface for edges-tcp.
      operations:
      - method: POST
        name: createtcpedge
        description: Ngrok Create TCP Edge
        call: ngrok-edges-tcp.createtcpedge
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listtcpedges
        description: Ngrok List TCP Edges
        call: ngrok-edges-tcp.listtcpedges
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/edges/tcp/{id}
