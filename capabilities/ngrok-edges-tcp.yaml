      description: REST surface for edges-tcp-id.
      operations:
      - method: GET
        name: gettcpedge
        description: Ngrok Get TCP Edge
        call: ngrok-edges-tcp.gettcpedge
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetcpedge
        description: Ngrok Update TCP Edge
        call: ngrok-edges-tcp.updatetcpedge
        with:
