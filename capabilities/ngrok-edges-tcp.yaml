    baseUri: https://api.ngrok.com
    description: Ngrok API — Edges TCP business capability. Self-contained, no shared references.
    resources:
    - name: edges-tcp
      path: /edges/tcp
      operations:
      - name: createtcpedge
        method: POST
        description: Ngrok Create TCP Edge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listtcpedges
        method: GET
        description: Ngrok List TCP Edges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: edges-tcp-id
      path: /edges/tcp/{id}
      operations:
      - name: gettcpedge
        method: GET
        description: Ngrok Get TCP Edge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetcpedge
        method: PATCH
        description: Ngrok Update TCP Edge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
