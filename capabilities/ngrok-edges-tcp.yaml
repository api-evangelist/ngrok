      - name: deletetcpedge
        method: DELETE
        description: Ngrok Delete TCP Edge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NGROK_API_KEY}}'
  exposes:
