        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetcpedge
        description: Ngrok Delete TCP Edge
        call: ngrok-edges-tcp.deletetcpedge
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
