naftiko: 1.0.0-alpha2
info:
  label: Ngrok API — Edges TCP
  description: 'Ngrok API — Edges TCP. 5 operations. Lead operation: Ngrok Create TCP Edge. Self-contained Naftiko capability
    covering one Ngrok business surface.'
  tags:
  - Ngrok
  - Edges TCP
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
