      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ngrok-edges-tcp.gettcpedge
      outputParameters:
      - type: object
        mapping: $.
    - name: ngrok-update-tcp-edge
      description: Ngrok Update TCP Edge
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ngrok-edges-tcp.updatetcpedge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ngrok-delete-tcp-edge
