      description: REST surface for tls_certificates-id.
      operations:
      - method: GET
        name: gettlscertificate
        description: Ngrok Get TLS Certificate
        call: ngrok-tls-certificates.gettlscertificate
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetlscertificate
