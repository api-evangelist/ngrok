        method: GET
        description: Ngrok Get TLS Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetlscertificate
        method: PATCH
        description: Ngrok Update TLS Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
