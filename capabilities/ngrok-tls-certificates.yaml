      - name: deletetlscertificate
        method: DELETE
        description: Ngrok Delete TLS Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.NGROK_API_KEY}}'
  exposes:
