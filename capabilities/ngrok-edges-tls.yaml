naftiko: 1.0.0-alpha2
info:
  label: Ngrok API — Edges TLS
  description: 'Ngrok API — Edges TLS. 5 operations. Lead operation: Ngrok Create TLS Edge. Self-contained Naftiko capability
    covering one Ngrok business surface.'
  tags:
  - Ngrok
  - Edges TLS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NGROK_API_KEY: NGROK_API_KEY
capability:
