        mapping: $.
    - name: ngrok-get-tls-edge
      description: Ngrok Get TLS Edge
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ngrok-edges-tls.gettlsedge
      outputParameters:
      - type: object
        mapping: $.
    - name: ngrok-update-tls-edge
      description: Ngrok Update TLS Edge
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: ngrok-edges-tls.updatetlsedge
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ngrok-delete-tls-edge
      description: Ngrok Delete TLS Edge
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ngrok-edges-tls.deletetlsedge
      outputParameters:
      - type: object
        mapping: $.
