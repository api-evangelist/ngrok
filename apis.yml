aid: ngrok
name: ngrok
description: >-
  ngrok is a unified application delivery network for developers, providing secure
  tunnels, ingress-as-a-service, API gateway, and AI gateway capabilities. It enables
  developers to expose local services on the public internet, manage edge ingress,
  and route traffic to AI providers without redeploying applications. ngrok provides
  a unique URL for each tunnel, traffic policy controls, and a comprehensive REST
  API for programmatic management of all resources.
