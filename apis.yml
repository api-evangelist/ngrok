apis:
  - aid: ngrok:ngrok
    name: ngrok API
    description: >-
      The ngrok API provides programmatic access to all of ngrok's resources. The
      API is REST-ish, follows most REST conventions, and listens only on port 443
      to avoid accidental unencrypted requests. All API access requires an API key.
      Resources include endpoints, tunnels, edges (HTTPS, TCP, TLS), backends,
      reserved domains and addresses, IP policies and restrictions, TLS and SSH
      certificates, event subscriptions, API keys, and credentials.
    humanURL: https://ngrok.com/docs/api
    baseURL: https://api.ngrok.com
    tags:
