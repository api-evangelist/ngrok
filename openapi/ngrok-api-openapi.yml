openapi: 3.1.0
info:
  title: Ngrok API
  description: >-
    The ngrok API provides programmatic access to all of ngrok's resources.
    The API is REST-ish. It follows most of the conventions of a REST API but
    diverges slightly when the REST model does not fit well. The API listens
    only on port 443 to help avoid any accidental unencrypted requests. All
    API access requires an API key.
  version: 2.0.0
  contact:
    name: Ngrok
    url: https://ngrok.com
  license:
    name: Proprietary
    url: https://ngrok.com/tos
servers:
  - url: https://api.ngrok.com
    description: Ngrok API Production Server
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  # Abuse Reports
  /abuse_reports:
    post:
      operationId: createAbuseReport
      summary: Ngrok Create Abuse Report
      description: Creates a new abuse report which will be reviewed by our system and abuse response team.
      tags:
        - Abuse Reports
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                  description: A list of URLs associated with the abuse report.
                metadata:
                  type: string
                  description: Arbitrary user-defined metadata.
      responses:
        '201':
          description: Abuse report created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseReport'
  /abuse_reports/{id}:
    get:
      operationId: getAbuseReport
      summary: Ngrok Get Abuse Report
      description: Get the detailed status of an abuse report by ID.
      tags:
        - Abuse Reports
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Abuse report details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbuseReport'

  # Agent Ingresses
  /agent_ingresses:
    post:
      operationId: createAgentIngress
      summary: Ngrok Create Agent Ingress
      description: Create a new Agent Ingress.
      tags:
        - Agent Ingresses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                domain:
                  type: string
                  description: The domain that the agent ingress will listen on.
                certificate_management_policy:
                  type: object
                  properties:
                    authority:
                      type: string
                    private_key_type:
                      type: string
      responses:
        '201':
          description: Agent ingress created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIngress'
    get:
      operationId: listAgentIngresses
      summary: Ngrok List Agent Ingresses
      description: List all Agent Ingresses.
      tags:
        - Agent Ingresses
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of agent ingresses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIngressList'
  /agent_ingresses/{id}:
    get:
      operationId: getAgentIngress
      summary: Ngrok Get Agent Ingress
      description: Get the details of an Agent Ingress by ID.
      tags:
        - Agent Ingresses
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Agent ingress details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIngress'
    patch:
      operationId: updateAgentIngress
      summary: Ngrok Update Agent Ingress
      description: Update attributes of an Agent Ingress by ID.
      tags:
        - Agent Ingresses
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
      responses:
        '200':
          description: Agent ingress updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentIngress'
    delete:
      operationId: deleteAgentIngress
      summary: Ngrok Delete Agent Ingress
      description: Delete an Agent Ingress by ID.
      tags:
        - Agent Ingresses
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Agent ingress deleted.

  # API Keys
  /api_keys:
    post:
      operationId: createApiKey
      summary: Ngrok Create API Key
      description: Create a new API key.
      tags:
        - API Keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                owner_id:
                  type: string
                  description: The ID of the owner resource.
      responses:
        '201':
          description: API key created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
    get:
      operationId: listApiKeys
      summary: Ngrok List API Keys
      description: List all API keys on this account.
      tags:
        - API Keys
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of API keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyList'
  /api_keys/{id}:
    get:
      operationId: getApiKey
      summary: Ngrok Get API Key
      description: Get the details of an API key by ID.
      tags:
        - API Keys
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: API key details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
    patch:
      operationId: updateApiKey
      summary: Ngrok Update API Key
      description: Update attributes of an API key by ID.
      tags:
        - API Keys
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
      responses:
        '200':
          description: API key updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
    delete:
      operationId: deleteApiKey
      summary: Ngrok Delete API Key
      description: Delete an API key by ID.
      tags:
        - API Keys
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: API key deleted.

  # Certificate Authorities
  /certificate_authorities:
    post:
      operationId: createCertificateAuthority
      summary: Ngrok Create Certificate Authority
      description: Upload a new Certificate Authority.
      tags:
        - Certificate Authorities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ca_pem
              properties:
                description:
                  type: string
                metadata:
                  type: string
                ca_pem:
                  type: string
                  description: The PEM-encoded CA certificate.
      responses:
        '201':
          description: Certificate authority created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthority'
    get:
      operationId: listCertificateAuthorities
      summary: Ngrok List Certificate Authorities
      description: List all Certificate Authorities on this account.
      tags:
        - Certificate Authorities
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of certificate authorities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthorityList'
  /certificate_authorities/{id}:
    get:
      operationId: getCertificateAuthority
      summary: Ngrok Get Certificate Authority
      description: Get the details of a Certificate Authority by ID.
      tags:
        - Certificate Authorities
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Certificate authority details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthority'
    patch:
      operationId: updateCertificateAuthority
      summary: Ngrok Update Certificate Authority
      description: Update attributes of a Certificate Authority by ID.
      tags:
        - Certificate Authorities
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
      responses:
        '200':
          description: Certificate authority updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthority'
    delete:
      operationId: deleteCertificateAuthority
      summary: Ngrok Delete Certificate Authority
      description: Delete a Certificate Authority by ID.
      tags:
        - Certificate Authorities
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Certificate authority deleted.

  # Credentials (Tunnel Credentials)
  /credentials:
    post:
      operationId: createCredential
      summary: Ngrok Create Credential
      description: Create a new tunnel authtoken credential.
      tags:
        - Credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                acl:
                  type: array
                  items:
                    type: string
                  description: Access control list of IP CIDRs.
                owner_id:
                  type: string
      responses:
        '201':
          description: Credential created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
    get:
      operationId: listCredentials
      summary: Ngrok List Credentials
      description: List all tunnel authtoken credentials on this account.
      tags:
        - Credentials
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialList'
  /credentials/{id}:
    get:
      operationId: getCredential
      summary: Ngrok Get Credential
      description: Get the details of a tunnel authtoken credential by ID.
      tags:
        - Credentials
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Credential details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
    patch:
      operationId: updateCredential
      summary: Ngrok Update Credential
      description: Update attributes of a tunnel authtoken credential by ID.
      tags:
        - Credentials
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                acl:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Credential updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
    delete:
      operationId: deleteCredential
      summary: Ngrok Delete Credential
      description: Delete a tunnel authtoken credential by ID.
      tags:
        - Credentials
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Credential deleted.

  # Endpoints
  /endpoints:
    post:
      operationId: createEndpoint
      summary: Ngrok Create Endpoint
      description: Create a new endpoint.
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: The URL for this endpoint.
                type:
                  type: string
                  description: Whether the endpoint is ephemeral or edge.
                description:
                  type: string
                metadata:
                  type: string
                bindings:
                  type: array
                  items:
                    type: string
                traffic_policy:
                  type: string
                  description: The traffic policy attached to this endpoint.
      responses:
        '201':
          description: Endpoint created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endpoint'
    get:
      operationId: listEndpoints
      summary: Ngrok List Endpoints
      description: List all active endpoints on the account.
      tags:
        - Endpoints
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of endpoints.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointList'
  /endpoints/{id}:
    get:
      operationId: getEndpoint
      summary: Ngrok Get Endpoint
      description: Get the details of an endpoint by ID.
      tags:
        - Endpoints
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Endpoint details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endpoint'
    patch:
      operationId: updateEndpoint
      summary: Ngrok Update Endpoint
      description: Update an endpoint by ID.
      tags:
        - Endpoints
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                description:
                  type: string
                metadata:
                  type: string
                bindings:
                  type: array
                  items:
                    type: string
                traffic_policy:
                  type: string
      responses:
        '200':
          description: Endpoint updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endpoint'
    delete:
      operationId: deleteEndpoint
      summary: Ngrok Delete Endpoint
      description: Delete an endpoint by ID.
      tags:
        - Endpoints
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Endpoint deleted.

  # Event Destinations
  /event_destinations:
    post:
      operationId: createEventDestination
      summary: Ngrok Create Event Destination
      description: Create a new Event Destination.
      tags:
        - Event Destinations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                format:
                  type: string
                  description: The output format, such as json or plain.
                target:
                  type: object
                  description: An object that encapsulates where and how to send event data.
                  properties:
                    firehose:
                      type: object
                    kinesis:
                      type: object
                    cloudwatch_logs:
                      type: object
                    datadog:
                      type: object
                    azure_logs_ingestion:
                      type: object
      responses:
        '201':
          description: Event destination created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDestination'
    get:
      operationId: listEventDestinations
      summary: Ngrok List Event Destinations
      description: List all Event Destinations on this account.
      tags:
        - Event Destinations
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of event destinations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDestinationList'
  /event_destinations/{id}:
    get:
      operationId: getEventDestination
      summary: Ngrok Get Event Destination
      description: Get the details of an Event Destination by ID.
      tags:
        - Event Destinations
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Event destination details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDestination'
    patch:
      operationId: updateEventDestination
      summary: Ngrok Update Event Destination
      description: Update attributes of an Event Destination by ID.
      tags:
        - Event Destinations
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                format:
                  type: string
                target:
                  type: object
      responses:
        '200':
          description: Event destination updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDestination'
    delete:
      operationId: deleteEventDestination
      summary: Ngrok Delete Event Destination
      description: Delete an Event Destination by ID.
      tags:
        - Event Destinations
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Event destination deleted.

  # Event Subscriptions
  /event_subscriptions:
    post:
      operationId: createEventSubscription
      summary: Ngrok Create Event Subscription
      description: Create an Event Subscription.
      tags:
        - Event Subscriptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                sources:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                  description: Sources that will publish events to this subscription.
                destination_ids:
                  type: array
                  items:
                    type: string
                  description: IDs of destinations that will receive events.
      responses:
        '201':
          description: Event subscription created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscription'
    get:
      operationId: listEventSubscriptions
      summary: Ngrok List Event Subscriptions
      description: List all Event Subscriptions on this account.
      tags:
        - Event Subscriptions
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of event subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscriptionList'
  /event_subscriptions/{id}:
    get:
      operationId: getEventSubscription
      summary: Ngrok Get Event Subscription
      description: Get an Event Subscription by ID.
      tags:
        - Event Subscriptions
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Event subscription details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscription'
    patch:
      operationId: updateEventSubscription
      summary: Ngrok Update Event Subscription
      description: Update an Event Subscription by ID.
      tags:
        - Event Subscriptions
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                sources:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                destination_ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Event subscription updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSubscription'
    delete:
      operationId: deleteEventSubscription
      summary: Ngrok Delete Event Subscription
      description: Delete an Event Subscription by ID.
      tags:
        - Event Subscriptions
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Event subscription deleted.

  # IP Policies
  /ip_policies:
    post:
      operationId: createIpPolicy
      summary: Ngrok Create IP Policy
      description: Create a new IP policy.
      tags:
        - IP Policies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
      responses:
        '201':
          description: IP policy created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicy'
    get:
      operationId: listIpPolicies
      summary: Ngrok List IP Policies
      description: List all IP policies on this account.
      tags:
        - IP Policies
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of IP policies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicyList'
  /ip_policies/{id}:
    get:
      operationId: getIpPolicy
      summary: Ngrok Get IP Policy
      description: Get the details of an IP policy by ID.
      tags:
        - IP Policies
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: IP policy details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicy'
    patch:
      operationId: updateIpPolicy
      summary: Ngrok Update IP Policy
      description: Update attributes of an IP policy by ID.
      tags:
        - IP Policies
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
      responses:
        '200':
          description: IP policy updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicy'
    delete:
      operationId: deleteIpPolicy
      summary: Ngrok Delete IP Policy
      description: Delete an IP policy by ID.
      tags:
        - IP Policies
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: IP policy deleted.

  # IP Policy Rules
  /ip_policy_rules:
    post:
      operationId: createIpPolicyRule
      summary: Ngrok Create IP Policy Rule
      description: Create a new IP policy rule attached to an IP policy.
      tags:
        - IP Policy Rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cidr
                - ip_policy_id
                - action
              properties:
                description:
                  type: string
                metadata:
                  type: string
                cidr:
                  type: string
                  description: An IP address or CIDR range.
                ip_policy_id:
                  type: string
                  description: ID of the IP policy this rule belongs to.
                action:
                  type: string
                  enum:
                    - allow
                    - deny
                  description: The action to take for this rule.
      responses:
        '201':
          description: IP policy rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicyRule'
    get:
      operationId: listIpPolicyRules
      summary: Ngrok List IP Policy Rules
      description: List all IP policy rules on this account.
      tags:
        - IP Policy Rules
      parameters:
        - $ref: '#/components/parameters/BeforeId'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of IP policy rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicyRuleList'
  /ip_policy_rules/{id}:
    get:
      operationId: getIpPolicyRule
      summary: Ngrok Get IP Policy Rule
      description: Get the details of an IP policy rule by ID.
      tags:
        - IP Policy Rules
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: IP policy rule details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicyRule'
    patch:
      operationId: updateIpPolicyRule
      summary: Ngrok Update IP Policy Rule
      description: Update attributes of an IP policy rule by ID.
      tags:
        - IP Policy Rules
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                metadata:
                  type: string
                cidr:
                  type: string
      responses:
        '200':
          description: IP policy rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpPolicyRule'
    delete:
      operationId: deleteIpPolicyRule
      summary: Ngrok Delete IP Policy Rule
      description: Delete an IP policy rule by ID.
      tags:
        - IP Policy Rules
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: IP policy rule deleted.

  # IP Restrictions
  /ip_restrictions:
    post:
      operationId: createIpRestriction
      summary: Ngrok Create IP Restriction
      description: Create a new IP restriction.
      tags:
        - IP Restrictions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
