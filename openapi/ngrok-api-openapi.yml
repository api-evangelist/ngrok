components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Use an ngrok API key as a Bearer token. Create API keys from the
        ngrok dashboard or via the API Keys endpoints.
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Pass the API key in the Authorization header prefixed with
        'Bearer '.

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: A unique identifier for the resource.
    BeforeId:
      name: before_id
      in: query
      required: false
      schema:
        type: string
      description: An ID to use for pagination. Results returned will be before this ID.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: string
      description: The maximum number of results to return. Maximum is 100.

  schemas:
    Ref:
      type: object
      properties:
        id:
          type: string
          description: A resource identifier.
        uri:
          type: string
          description: A URI for locating a resource.

    AbuseReport:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        created_at:
          type: string
          format: date-time
        urls:
          type: array
          items:
            type: string
        metadata:
          type: string
        status:
          type: string
        hostnames:
          type: array
          items:
            type: object
            properties:
              hostname:
                type: string
              status:
                type: string

    AgentIngress:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        description:
          type: string
        metadata:
          type: string
        domain:
          type: string
        ns_targets:
          type: array
          items:
            type: string
        region_domains:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        certificate_management_policy:
          type: object
        certificate_management_status:
          type: object

    AgentIngressList:
      type: object
      properties:
        ingresses:
          type: array
          items:
            $ref: '#/components/schemas/AgentIngress'
        uri:
          type: string
        next_page_uri:
          type: string

    ApiKey:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        description:
          type: string
        metadata:
          type: string
        created_at:
          type: string
          format: date-time
        token:
          type: string
          description: Only present in create response.
        owner_id:
          type: string

    ApiKeyList:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'
        uri:
          type: string
        next_page_uri:
          type: string

    CertificateAuthority:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        created_at:
          type: string
          format: date-time
        description:
          type: string
        metadata:
          type: string
        ca_pem:
          type: string
        subject_common_name:
          type: string
        not_before:
          type: string
          format: date-time
        not_after:
          type: string
          format: date-time
        key_usages:
          type: array
          items:
            type: string
        extended_key_usages:
          type: array
          items:
            type: string

    CertificateAuthorityList:
      type: object
      properties:
        certificate_authorities:
          type: array
          items:
            $ref: '#/components/schemas/CertificateAuthority'
        uri:
          type: string
        next_page_uri:
          type: string

    Credential:
      type: object
      properties:
        id:
          type: string
        uri:
          type: string
        created_at:
          type: string
          format: date-time
        description:
          type: string
        metadata:
          type: string
        token:
          type: string
          description: Only present in create response.
        acl:
          type: array
          items:
            type: string
        owner_id:
          type: string

    CredentialList:
      type: object
      properties:
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/Credential'
        uri:
          type: string
        next_page_uri:
          type: string

    Endpoint:
      type: object
